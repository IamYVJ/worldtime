<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worldtime — See the world, one hour at a time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="dark"]{
  --color-bg:#0f0f0e;--color-surface:#161614;--color-surface-2:#1c1b19;
  --color-surface-offset:#222220;--color-border:oklch(1 0 0 / 0.08);
  --color-text:#e8e6e1;--color-text-muted:#7a7974;--color-text-faint:#4a4946;
  --color-primary:#4f98a3;--color-primary-highlight:#313b3b;
  --color-divider:oklch(1 0 0 / 0.06);--color-day:#e8af34;
  --color-night:#7a7abb;--color-scrub-active:#4f98a3;
  --shadow-sm:0 1px 3px oklch(0 0 0 / 0.3);--shadow-md:0 4px 16px oklch(0 0 0 / 0.4);
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;
  --radius-xl:1rem;--radius-full:9999px;--transition:150ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#ffffff;--color-surface-2:#f3f0ec;
  --color-surface-offset:#edeae5;--color-border:oklch(0.2 0.01 80 / 0.10);
  --color-text:#1a1916;--color-text-muted:#6b6a65;--color-text-faint:#b0aeaa;
  --color-primary:#01696f;--color-primary-highlight:#cedcd8;
  --color-divider:oklch(0.2 0.01 80 / 0.08);
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80 / 0.06);--shadow-md:0 4px 12px oklch(0.2 0.01 80 / 0.08);
}
html{font-size:16px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:clamp(0.875rem,1.2vw,1rem);line-height:1.6;
  color:var(--color-text);background:var(--color-bg);
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
h1,h2,h3{font-weight:400;line-height:1.2}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font:inherit;color:inherit}
a{color:var(--color-primary);text-decoration:none}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px;border-radius:var(--radius-sm)}

/* Skip link */
.skip-link{
  position:absolute;top:-100%;left:50%;transform:translateX(-50%);
  padding:0.75rem 1.5rem;background:var(--color-primary);color:#fff;
  border-radius:var(--radius-sm);z-index:1000;font-weight:600;
  transition:top var(--transition);
}
.skip-link:focus{top:1rem}

/* Header */
.header{
  max-width:1400px;margin:0 auto;padding:1.5rem 1.5rem 1rem;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;
}
.header-left{display:flex;align-items:center;gap:0.75rem}
.header-title{
  font-family:'Instrument Serif',Georgia,serif;font-size:clamp(1.5rem,3vw,2rem);
  font-weight:400;color:var(--color-text);
}
.header-tagline{
  font-size:clamp(0.75rem,1.2vw,0.875rem);color:var(--color-text-muted);
  margin-top:0.125rem;
}
.header-controls{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap}

/* Toggles */
.toggle-btn{
  display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.75rem;
  border-radius:var(--radius-full);background:var(--color-surface-2);
  border:1px solid var(--color-border);min-width:44px;min-height:44px;
  transition:background var(--transition),border-color var(--transition);
  font-size:0.8125rem;color:var(--color-text-muted);
}
.toggle-btn:hover{background:var(--color-surface-offset);color:var(--color-text)}
.toggle-btn .icon{width:18px;height:18px;flex-shrink:0}
.toggle-btn .label{display:none}
@media(min-width:640px){.toggle-btn .label{display:inline}}

/* Time Travel Banner */
.banner{
  max-width:1400px;margin:0 auto;padding:0 1.5rem;
  opacity:0;transform:translateY(-8px);pointer-events:none;
  transition:opacity 200ms ease,transform 200ms ease;
}
.banner.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.banner-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.75rem 1rem;border-radius:var(--radius-md);
  background:var(--color-primary-highlight);border:1px solid var(--color-primary);
}
.banner-text{font-size:0.875rem;color:var(--color-text)}
.banner-text strong{color:var(--color-primary)}
.banner-reset{
  padding:0.375rem 0.75rem;border-radius:var(--radius-sm);
  background:var(--color-primary);color:#fff;font-size:0.8125rem;
  min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;
  transition:opacity var(--transition);
}
.banner-reset:hover{opacity:0.85}

/* Grid */
.grid{
  max-width:1400px;margin:0 auto;padding:1.5rem;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,320px),1fr));
  gap:1rem;
}

/* Card */
.card{
  background:var(--color-surface);border:1px solid var(--color-border);
  border-radius:var(--radius-lg);padding:1.25rem;
  box-shadow:var(--shadow-sm);position:relative;
  opacity:0;transform:translateY(12px);
  transition:opacity 200ms ease,transform 200ms ease,box-shadow var(--transition);
}
@media(prefers-reduced-motion:no-preference){
  .card.enter{opacity:1;transform:translateY(0)}
  .card.remove{opacity:0;transform:scale(0.95);pointer-events:none}
}
.card:hover{box-shadow:var(--shadow-md)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.75rem}
.card-city{font-size:clamp(1rem,1.5vw,1.125rem);font-weight:600;color:var(--color-text)}
.card-local-tag{
  font-size:0.625rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;
  padding:0.0625rem 0.5rem;border-radius:var(--radius-full);margin-left:0.5rem;vertical-align:middle;
  background:color-mix(in srgb,var(--color-primary) 18%,transparent);color:var(--color-primary);
}
.card-country{font-size:0.75rem;color:var(--color-text-muted);margin-top:0.125rem}
.card-remove{
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-full);flex-shrink:0;
  transition:background var(--transition),color var(--transition);
}
.card-remove:hover{background:var(--color-surface-offset);color:var(--color-text)}
.card-remove .icon{width:18px;height:18px}
.card-time{
  font-size:clamp(2rem,4vw,2.75rem);font-weight:300;
  font-variant-numeric:tabular-nums lining-nums;
  font-family:'Inter',monospace;letter-spacing:-0.02em;
  color:var(--color-text);margin-bottom:0.25rem;line-height:1.1;
}
.card-date{font-size:0.8125rem;color:var(--color-text-muted);margin-bottom:1.25rem}
.card-period{font-size:0.75rem;font-weight:600;padding:0.125rem 0.5rem;border-radius:var(--radius-full);display:inline-block;margin-left:0.5rem;vertical-align:middle}
.card-period.day{background:color-mix(in srgb,var(--color-day) 15%,transparent);color:var(--color-day)}
.card-period.night{background:color-mix(in srgb,var(--color-night) 15%,transparent);color:var(--color-night)}
.card-date-offset{font-size:0.6875rem;font-weight:600;padding:0.125rem 0.375rem;border-radius:var(--radius-full);display:inline-block;margin-left:0.375rem;vertical-align:middle}
.card-date-offset.forward{background:color-mix(in srgb,var(--color-primary) 15%,transparent);color:var(--color-primary)}
.card-date-offset.backward{background:color-mix(in srgb,var(--color-night) 15%,transparent);color:var(--color-night)}
.card-utc{font-size:0.6875rem;color:var(--color-text-faint);margin-bottom:1rem}

/* Slider */
.slider-container{position:relative}
.slider-labels{display:flex;justify-content:space-between;margin-bottom:0.375rem}
.slider-label{font-size:0.6875rem;color:var(--color-text-faint)}
.slider{
  -webkit-appearance:none;appearance:none;width:100%;height:6px;
  border-radius:var(--radius-full);background:var(--color-surface-offset);
  outline:none;cursor:pointer;transition:background var(--transition);
}
.slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:var(--color-scrub-active);cursor:grab;
  box-shadow:0 0 0 3px var(--color-surface),0 0 0 5px var(--color-primary);
  transition:box-shadow var(--transition),transform var(--transition);
}
.slider::-webkit-slider-thumb:hover{transform:scale(1.15)}
.slider::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.1)}
.slider::-moz-range-thumb{
  width:20px;height:20px;border:none;border-radius:50%;
  background:var(--color-scrub-active);cursor:grab;
  box-shadow:0 0 0 3px var(--color-surface),0 0 0 5px var(--color-primary);
}
.slider::-moz-range-thumb:hover{transform:scale(1.15)}
.slider::-moz-range-thumb:active{cursor:grabbing;transform:scale(1.1)}
.slider-value{
  text-align:center;font-size:0.75rem;color:var(--color-primary);
  margin-top:0.375rem;font-variant-numeric:tabular-nums;
}

/* Add timezone panel */
.add-panel{
  max-width:1400px;margin:0 auto;padding:0 1.5rem 2rem;
  opacity:0;transform:translateY(12px) scale(0.98);pointer-events:none;
  transition:opacity 180ms ease,transform 180ms ease;
}
.add-panel.visible{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.add-panel-inner{
  background:var(--color-surface);border:1px solid var(--color-border);
  border-radius:var(--radius-lg);padding:1.25rem;box-shadow:var(--shadow-sm);
}
.add-panel-title{font-size:1rem;font-weight:600;margin-bottom:0.75rem;color:var(--color-text)}
.add-search{
  width:100%;padding:0.625rem 0.875rem;border-radius:var(--radius-md);
  background:var(--color-surface-2);border:1px solid var(--color-border);
  color:var(--color-text);font-size:0.875rem;
  transition:border-color var(--transition),background var(--transition);
  min-height:44px;
}
.add-search::placeholder{color:var(--color-text-faint)}
.add-search:focus{border-color:var(--color-primary);background:var(--color-surface-offset)}
.add-list{
  margin-top:0.75rem;display:flex;flex-direction:column;gap:0.25rem;
  max-height:240px;overflow-y:auto;
}
.add-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.5rem 0.625rem;border-radius:var(--radius-sm);
  transition:background var(--transition);min-height:44px;
}
.add-item:hover{background:var(--color-surface-2)}
.add-item-info{display:flex;flex-direction:column}
.add-item-city{font-size:0.875rem;color:var(--color-text);font-weight:500}
.add-item-meta{font-size:0.6875rem;color:var(--color-text-muted)}
.add-item-add{
  padding:0.375rem 0.75rem;border-radius:var(--radius-sm);
  background:var(--color-primary);color:#fff;font-size:0.75rem;
  min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;
  transition:opacity var(--transition);
}
.add-item-add:hover{opacity:0.85}
.add-item-add:disabled{opacity:0.3;cursor:not-allowed}
.add-empty{font-size:0.8125rem;color:var(--color-text-muted);padding:1rem 0;text-align:center}

/* Footer */
.footer{
  max-width:1400px;margin:0 auto;padding:1rem 1.5rem 2rem;
  text-align:center;font-size:0.6875rem;color:var(--color-text-faint);
}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--color-text-faint);border-radius:var(--radius-full)}
::-webkit-scrollbar-thumb:hover{background:var(--color-text-muted)}
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>

<header class="header" role="banner">
  <div class="header-left">
    <svg class="logo" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="9"/>
      <path d="M12 3c-1.5 2-2.5 4.5-2.5 9s1 7 2.5 9"/>
      <path d="M12 3c1.5 2 2.5 4.5 2.5 9s-1 7-2.5 9"/>
      <path d="M3 12h18"/>
      <path d="M5.5 7h13"/>
      <path d="M5.5 17h13"/>
      <line x1="12" y1="3" x2="12" y2="21"/>
      <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
    </svg>
    <div>
      <h1 class="header-title">Worldtime</h1>
      <p class="header-tagline">See the world, one hour at a time</p>
    </div>
  </div>
  <div class="header-controls">
    <button class="toggle-btn" id="btn24h" aria-label="Toggle 12/24 hour format" title="Toggle 12/24h">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      <span class="label" id="label24h">24H</span>
    </button>
    <button class="toggle-btn" id="btnTheme" aria-label="Toggle theme" title="Toggle theme">
      <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"/></svg>
      <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
      <span class="label" id="labelTheme">Light</span>
    </button>
  </div>
</header>

<div class="banner" id="banner" role="status" aria-live="polite">
  <div class="banner-inner">
    <span class="banner-text" id="bannerText">Time Travel Active</span>
    <button class="banner-reset" id="btnReset" aria-label="Reset to current time">Reset</button>
  </div>
</div>

<main id="main" class="grid" role="main" aria-label="World time cards"></main>

<div class="add-panel" id="addPanel">
  <div class="add-panel-inner">
    <h2 class="add-panel-title">Add Timezone</h2>
    <input class="add-search" id="addSearch" type="search" placeholder="Search city or timezone..." aria-label="Search timezones" autocomplete="off">
    <div class="add-list" id="addList"></div>
  </div>
</div>

<footer class="footer">
  <p>Worldtime &mdash; Drag sliders to travel through time.</p>
</footer>

<script>
const TIMEZONE_DATA = [
  {id:"UTC",city:"UTC",country:"Coordinated Universal Time",abbr:"UTC"},
  {id:"America/New_York",city:"New York",country:"United States",abbr:"EST"},
  {id:"America/Los_Angeles",city:"Los Angeles",country:"United States",abbr:"PST"},
  {id:"America/Chicago",city:"Chicago",country:"United States",abbr:"CST"},
  {id:"America/Toronto",city:"Toronto",country:"Canada",abbr:"EST"},
  {id:"America/Vancouver",city:"Vancouver",country:"Canada",abbr:"PST"},
  {id:"America/Sao_Paulo",city:"S\u00e3o Paulo",country:"Brazil",abbr:"BRT"},
  {id:"America/Mexico_City",city:"Mexico City",country:"Mexico",abbr:"CST"},
  {id:"America/Buenos_Aires",city:"Buenos Aires",country:"Argentina",abbr:"ART"},
  {id:"Europe/London",city:"London",country:"United Kingdom",abbr:"GMT"},
  {id:"Europe/Paris",city:"Paris",country:"France",abbr:"CET"},
  {id:"Europe/Berlin",city:"Berlin",country:"Germany",abbr:"CET"},
  {id:"Europe/Madrid",city:"Madrid",country:"Spain",abbr:"CET"},
  {id:"Europe/Rome",city:"Rome",country:"Italy",abbr:"CET"},
  {id:"Europe/Amsterdam",city:"Amsterdam",country:"Netherlands",abbr:"CET"},
  {id:"Europe/Stockholm",city:"Stockholm",country:"Sweden",abbr:"CET"},
  {id:"Europe/Moscow",city:"Moscow",country:"Russia",abbr:"MSK"},
  {id:"Europe/Istanbul",city:"Istanbul",country:"Turkey",abbr:"TRT"},
  {id:"Africa/Cairo",city:"Cairo",country:"Egypt",abbr:"EET"},
  {id:"Africa/Lagos",city:"Lagos",country:"Nigeria",abbr:"WAT"},
  {id:"Africa/Johannesburg",city:"Johannesburg",country:"South Africa",abbr:"SAST"},
  {id:"Africa/Nairobi",city:"Nairobi",country:"Kenya",abbr:"EAT"},
  {id:"Asia/Dubai",city:"Dubai",country:"UAE",abbr:"GST"},
  {id:"Asia/Kolkata",city:"Mumbai",country:"India",abbr:"IST"},
  {id:"Asia/Karachi",city:"Karachi",country:"Pakistan",abbr:"PKT"},
  {id:"Asia/Dhaka",city:"Dhaka",country:"Bangladesh",abbr:"BST"},
  {id:"Asia/Colombo",city:"Colombo",country:"Sri Lanka",abbr:"IST"},
  {id:"Asia/Bangkok",city:"Bangkok",country:"Thailand",abbr:"ICT"},
  {id:"Asia/Singapore",city:"Singapore",country:"Singapore",abbr:"SGT"},
  {id:"Asia/Kuala_Lumpur",city:"Kuala Lumpur",country:"Malaysia",abbr:"MYT"},
  {id:"Asia/Hong_Kong",city:"Hong Kong",country:"Hong Kong",abbr:"HKT"},
  {id:"Asia/Shanghai",city:"Shanghai",country:"China",abbr:"CST"},
  {id:"Asia/Tokyo",city:"Tokyo",country:"Japan",abbr:"JST"},
  {id:"Asia/Seoul",city:"Seoul",country:"South Korea",abbr:"KST"},
  {id:"Asia/Jakarta",city:"Jakarta",country:"Indonesia",abbr:"WIB"},
  {id:"Asia/Tehran",city:"Tehran",country:"Iran",abbr:"IRST"},
  {id:"Asia/Riyadh",city:"Riyadh",country:"Saudi Arabia",abbr:"AST"},
  {id:"Asia/Jerusalem",city:"Jerusalem",country:"Israel",abbr:"IST"},
  {id:"Australia/Sydney",city:"Sydney",country:"Australia",abbr:"AEDT"},
  {id:"Australia/Melbourne",city:"Melbourne",country:"Australia",abbr:"AEDT"},
  {id:"Australia/Perth",city:"Perth",country:"Australia",abbr:"AWST"},
  {id:"Australia/Brisbane",city:"Brisbane",country:"Australia",abbr:"AEST"},
  {id:"Pacific/Auckland",city:"Auckland",country:"New Zealand",abbr:"NZDT"},
  {id:"Pacific/Honolulu",city:"Honolulu",country:"United States",abbr:"HST"},
  {id:"Pacific/Fiji",city:"Suva",country:"Fiji",abbr:"FJT"},
];

const DEFAULT_TIMEZONES = [
  "UTC","America/New_York","Europe/London","Europe/Paris",
  "Asia/Dubai","Asia/Kolkata","Asia/Singapore","Asia/Tokyo",
  "Australia/Sydney","America/Los_Angeles","America/Sao_Paulo","America/Toronto"
];

function canonicalTz(tz) {
  try { return Intl.DateTimeFormat('en-US', { timeZone: tz }).resolvedOptions().timeZone; }
  catch { return tz; }
}

const LOCAL_TZ = (() => {
  let raw;
  try { raw = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC'; }
  catch { return 'UTC'; }
  const canon = canonicalTz(raw);
  const match = TIMEZONE_DATA.find(d => canonicalTz(d.id) === canon);
  return match ? match.id : raw;
})();

if (!TIMEZONE_DATA.some(d => d.id === LOCAL_TZ)) {
  const parts = LOCAL_TZ.split('/');
  TIMEZONE_DATA.push({
    id: LOCAL_TZ,
    city: parts[parts.length - 1].replace(/_/g, ' '),
    country: parts.length > 1 ? parts[0] : '',
    abbr: '',
  });
}

const state = {
  timezones: [LOCAL_TZ, ...DEFAULT_TIMEZONES.filter(tz => tz !== LOCAL_TZ)],
  is24h: true,
  isDark: true,
  offsetMinutes: 0,
  intervalId: null,
  isDragging: false,
  sliderValues: {},
};

function getCurrentTime(tzId, when) {
  const instant = when || new Date();
  const tzFormatter = new Intl.DateTimeFormat('en-US', {
    timeZone: tzId, hour: 'numeric', minute: '2-digit', second: '2-digit',
    hour12: false, weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
  });
  const parts = tzFormatter.formatToParts(instant);
  const get = (type) => parts.find(p => p.type === type)?.value || '';
  const hour = parseInt(get('hour'), 10) % 24;
  const minute = parseInt(get('minute'), 10);
  const second = parseInt(get('second'), 10);
  const weekday = get('weekday');
  const month = get('month');
  const day = get('day');
  const year = get('year');
  const dateStr = month + ' ' + day + ', ' + year;

  const tzFormatterOffset = new Intl.DateTimeFormat('en-US', {
    timeZone: tzId, timeZoneName: 'shortOffset',
  });
  const offsetParts = tzFormatterOffset.formatToParts(instant);
  const tzName = offsetParts.find(p => p.type === 'timeZoneName')?.value || '';
  const utcOffset = tzName.replace(/^(GMT|UTC)/, '');

  return { hour, minute, second, weekday, month, day, year, date: dateStr, utcOffset };
}

// Days-since-epoch for the calendar date in a given zone at a given instant.
function dayNumberInZone(tzId, instant) {
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: tzId, year: 'numeric', month: 'numeric', day: 'numeric',
  }).formatToParts(instant);
  const g = (type) => parseInt(parts.find(p => p.type === type)?.value || '0', 10);
  return Math.round(Date.UTC(g('year'), g('month') - 1, g('day')) / 86400000);
}

function isDaytime(hour) {
  return hour >= 6 && hour < 18;
}

function formatTime(hour, minute, second, use24h) {
  const pad = (n) => String(n).padStart(2, '0');
  if (use24h) return pad(hour) + ':' + pad(minute) + ':' + pad(second);
  const h12 = hour % 12 || 12;
  return pad(h12) + ':' + pad(minute) + ':' + pad(second) + ' ' + (hour < 12 ? 'AM' : 'PM');
}

function getSliderValue(tzId) {
  if (state.sliderValues[tzId] !== undefined) return state.sliderValues[tzId];
  const t = getCurrentTime(tzId);
  return t.hour * 60 + t.minute;
}

function createCard(tzId) {
  const data = TIMEZONE_DATA.find(d => d.id === tzId);
  if (!data) return null;
  const isLocal = tzId === LOCAL_TZ;
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.tz = tzId;
  card.setAttribute('role', 'region');
  card.setAttribute('aria-label', data.city + (isLocal ? ' local time' : ' time'));

  const sliderVal = getSliderValue(tzId);
  state.sliderValues[tzId] = sliderVal;

  card.innerHTML = `
    <div class="card-header">
      <div>
        <div class="card-city">${data.city}${isLocal ? '<span class="card-local-tag">Local</span>' : ''}</div>
        <div class="card-country">${data.country}</div>
      </div>
      ${isLocal ? '' : `<button class="card-remove" data-remove="${tzId}" aria-label="Remove ${data.city}" title="Remove">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>`}
    </div>
    <div class="card-time" id="time-${tzId.replace(/\//g, '_')}"></div>
    <div class="card-date" id="date-${tzId.replace(/\//g, '_')}"></div>
    <div class="card-utc" id="utc-${tzId.replace(/\//g, '_')}"></div>
    <div class="slider-container">
      <div class="slider-labels">
        <span class="slider-label">12AM</span>
        <span class="slider-label">6AM</span>
        <span class="slider-label">12PM</span>
        <span class="slider-label">6PM</span>
        <span class="slider-label">11PM</span>
      </div>
      <input type="range" class="slider" min="0" max="1439" value="${sliderVal}"
        data-tz="${tzId}" aria-label="Time slider for ${data.city}" tabindex="0">
      <div class="slider-value" id="slider-val-${tzId.replace(/\//g, '_')}"></div>
    </div>
  `;

  const slider = card.querySelector('.slider');
  updateSliderTrack(slider, sliderVal);

  slider.addEventListener('input', (e) => onSliderInput(e, tzId));
  const removeBtn = card.querySelector('[data-remove]');
  if (removeBtn) removeBtn.addEventListener('click', () => removeTimezone(tzId));

  return card;
}

function updateSliderTrack(slider, value) {
  const pct = (value / 1439) * 100;
  slider.style.background = `linear-gradient(to right, var(--color-scrub-active) 0%, var(--color-scrub-active) ${pct}%, var(--color-surface-offset) ${pct}%, var(--color-surface-offset) 100%)`;
}

function renderAllCards() {
  const grid = document.getElementById('main');
  const existingCards = new Set();
  grid.querySelectorAll('.card').forEach(c => existingCards.add(c.dataset.tz));

  const desiredCards = new Set(state.timezones);

  desiredCards.forEach(tzId => {
    let card = grid.querySelector(`.card[data-tz="${tzId}"]`);
    if (!card) {
      card = createCard(tzId);
      if (card) {
        grid.appendChild(card);
        requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('enter')));
      }
    }
  });

  existingCards.forEach(tzId => {
    if (!desiredCards.has(tzId)) {
      const card = grid.querySelector(`.card[data-tz="${tzId}"]`);
      if (card) {
        card.classList.remove('enter');
        card.classList.add('remove');
        setTimeout(() => card.remove(), 180);
      }
    }
  });

  const now = new Date();
  const adjNow = new Date(now.getTime() + state.offsetMinutes * 60000);
  const localDayNum = dayNumberInZone(LOCAL_TZ, adjNow);

  state.timezones.forEach(tzId => {
    const card = grid.querySelector(`.card[data-tz="${tzId}"]`);
    if (card) {
      // Both the time and the date are derived from the same adjusted instant,
      // so they always stay in sync when time-travelling across midnight.
      const t = getCurrentTime(tzId, adjNow);
      const adjustedHour = t.hour;
      const adjustedMinute = t.minute;
      const adjustedSecond = t.second;

      const key = tzId.replace(/\//g, '_');
      const timeEl = document.getElementById('time-' + key);
      const dateEl = document.getElementById('date-' + key);
      const utcEl = document.getElementById('utc-' + key);
      const valEl = document.getElementById('slider-val-' + key);

      if (timeEl) {
        const period = isDaytime(adjustedHour) ? 'day' : 'night';
        const periodLabel = isDaytime(adjustedHour) ? 'Day' : 'Night';
        timeEl.innerHTML = formatTime(adjustedHour, adjustedMinute, adjustedSecond, state.is24h) +
          `<span class="card-period ${period}">${periodLabel}</span>`;
      }
      if (dateEl) {
        const dayDiff = dayNumberInZone(tzId, adjNow) - localDayNum;
        let dayFlag = '';
        if (dayDiff === 1) dayFlag = '<span class="card-date-offset forward">+1 day</span>';
        else if (dayDiff === -1) dayFlag = '<span class="card-date-offset backward">-1 day</span>';
        else if (dayDiff > 1) dayFlag = '<span class="card-date-offset forward">+' + dayDiff + ' days</span>';
        else if (dayDiff < -1) dayFlag = '<span class="card-date-offset backward">' + dayDiff + ' days</span>';
        dateEl.innerHTML = t.weekday + ', ' + t.month + ' ' + t.day + ', ' + t.year + dayFlag;
      }
      if (utcEl) utcEl.textContent = 'UTC' + t.utcOffset;

      const currentSliderVal = adjustedHour * 60 + adjustedMinute;
      state.sliderValues[tzId] = currentSliderVal;
      const slider = card.querySelector('.slider');
      if (slider) {
        if (parseInt(slider.value, 10) !== currentSliderVal) {
          slider.value = currentSliderVal;
          updateSliderTrack(slider, currentSliderVal);
        }
      }
      if (valEl) {
        const h = Math.floor(currentSliderVal / 60);
        const m = currentSliderVal % 60;
        valEl.textContent = formatTime(h, m, 0, state.is24h);
      }
    }
  });

  updateBanner();
}

function updateBanner() {
  const banner = document.getElementById('banner');
  const bannerText = document.getElementById('bannerText');
  if (state.offsetMinutes !== 0) {
    const sign = state.offsetMinutes > 0 ? '+' : '-';
    let total = Math.abs(state.offsetMinutes);
    const d = Math.floor(total / 1440); total %= 1440;
    const h = Math.floor(total / 60);
    const m = total % 60;
    const segs = [];
    if (d) segs.push(d + 'd');
    if (h) segs.push(h + 'h');
    if (m || !segs.length) segs.push(m + 'm');
    bannerText.innerHTML = 'Time Travel Active <strong>' + sign + segs.join(' ') + '</strong>';
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
}

function tick() {
  if (state.isDragging) return;
  state.timezones.forEach(tzId => {
    const t = getCurrentTime(tzId);
    if (state.sliderValues[tzId] === undefined) {
      state.sliderValues[tzId] = t.hour * 60 + t.minute;
    }
  });
  renderAllCards();
}

function startClock() {
  stopClock();
  state.intervalId = setInterval(tick, 1000);
  tick();
}

function stopClock() {
  if (state.intervalId) {
    clearInterval(state.intervalId);
    state.intervalId = null;
  }
}

function setOffset(deltaMinutes) {
  state.offsetMinutes += deltaMinutes;
  renderAllCards();
}

function onSliderInput(event, tzId) {
  const slider = event.target;
  const newMinuteOfDay = parseInt(slider.value, 10);

  if (state.sliderValues[tzId] === undefined) {
    state.sliderValues[tzId] = getSliderValue(tzId);
  }

  const oldMinuteOfDay = state.sliderValues[tzId];
  let delta = newMinuteOfDay - oldMinuteOfDay;

  if (delta > 720) delta -= 1440;
  if (delta < -720) delta += 1440;

  state.sliderValues[tzId] = newMinuteOfDay;

  if (delta !== 0) {
    setOffset(delta);
  }

  updateSliderTrack(slider, newMinuteOfDay);

  const card = slider.closest('.card');
  const valEl = card.querySelector('.slider-value');
  valEl.textContent = formatTime(Math.floor(newMinuteOfDay / 60), newMinuteOfDay % 60, 0, state.is24h);

  if (!state.isDragging) {
    state.isDragging = true;
    stopClock();
  }
}

document.addEventListener('mouseup', () => {
  if (state.isDragging) {
    state.isDragging = false;
    startClock();
  }
});
document.addEventListener('touchend', () => {
  if (state.isDragging) {
    state.isDragging = false;
    startClock();
  }
});

function resetToNow() {
  state.offsetMinutes = 0;
  state.timezones.forEach(tzId => {
    const t = getCurrentTime(tzId);
    state.sliderValues[tzId] = t.hour * 60 + t.minute;
  });
  renderAllCards();
}

function addTimezone(tzId) {
  if (!state.timezones.includes(tzId)) {
    state.timezones.push(tzId);
    state.sliderValues[tzId] = undefined;
    const t = getCurrentTime(tzId);
    state.sliderValues[tzId] = t.hour * 60 + t.minute;
    renderAllCards();
  }
  document.getElementById('addSearch').value = '';
  renderAddList('');
}

function removeTimezone(tzId) {
  state.timezones = state.timezones.filter(id => id !== tzId);
  delete state.sliderValues[tzId];
  renderAllCards();
}

function toggleTheme() {
  state.isDark = !state.isDark;
  document.documentElement.setAttribute('data-theme', state.isDark ? 'dark' : 'light');
  const sunIcon = document.querySelector('.icon-sun');
  const moonIcon = document.querySelector('.icon-moon');
  const label = document.getElementById('labelTheme');
  if (state.isDark) {
    sunIcon.style.display = '';
    moonIcon.style.display = 'none';
    label.textContent = 'Light';
  } else {
    sunIcon.style.display = 'none';
    moonIcon.style.display = '';
    label.textContent = 'Dark';
  }
}

function toggle24h() {
  state.is24h = !state.is24h;
  document.getElementById('label24h').textContent = state.is24h ? '24H' : '12H';
  renderAllCards();
}

function renderAddList(query) {
  const list = document.getElementById('addList');
  const q = query.toLowerCase().trim();
  const filtered = TIMEZONE_DATA.filter(d =>
    !state.timezones.includes(d.id) && (
      d.city.toLowerCase().includes(q) ||
      d.country.toLowerCase().includes(q) ||
      d.id.toLowerCase().includes(q) ||
      d.abbr.toLowerCase().includes(q)
    )
  );

  if (filtered.length === 0) {
    list.innerHTML = '<div class="add-empty">' + (q ? 'No matching timezones found' : 'All timezones added') + '</div>';
    return;
  }

  list.innerHTML = filtered.map(d => `
    <div class="add-item">
      <div class="add-item-info">
        <span class="add-item-city">${d.city}</span>
        <span class="add-item-meta">${d.country} &middot; ${d.abbr}</span>
      </div>
      <button class="add-item-add" data-add="${d.id}" aria-label="Add ${d.city}">Add</button>
    </div>
  `).join('');

  list.querySelectorAll('[data-add]').forEach(btn => {
    btn.addEventListener('click', () => addTimezone(btn.dataset.add));
  });
}

function init() {
  const btn24h = document.getElementById('btn24h');
  const btnTheme = document.getElementById('btnTheme');
  const btnReset = document.getElementById('btnReset');
  const addSearch = document.getElementById('addSearch');

  btn24h.addEventListener('click', toggle24h);
  btnTheme.addEventListener('click', toggleTheme);
  btnReset.addEventListener('click', resetToNow);

  addSearch.addEventListener('input', (e) => renderAddList(e.target.value));

  document.getElementById('addPanel').classList.add('visible');
  renderAddList('');
  renderAllCards();
  startClock();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
