<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
  // Theme bootstrap — runs before first paint so we never flash the wrong theme.
  // Honors a saved choice if one exists, otherwise the OS setting
  // (prefers-color-scheme), defaulting to dark (the house style) when the OS
  // states no preference. The key string mirrors STORAGE_KEY in worldtime-data.js;
  // it's duplicated inline here because that file loads too late to prevent a flash.
  (function () {
    try {
      var saved = JSON.parse(localStorage.getItem('worldtime:v1') || 'null');
      var light = saved && typeof saved.isDark === 'boolean'
        ? !saved.isDark
        : !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches);
      document.documentElement.setAttribute('data-theme', light ? 'light' : 'dark');
    } catch (e) {}
  })();
</script>

<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="dark"]{
  --color-bg:#0a0a0c;--color-surface:#141417;--color-surface-2:#1a1a1e;
  --color-surface-offset:#232328;--color-border:oklch(1 0 0 / 0.07);
  --color-border-strong:oklch(1 0 0 / 0.14);
  --color-text:#ededec;--color-text-muted:#8c8c89;--color-text-faint:#56565a;
  --color-primary:#56b4c0;--color-primary-strong:#7ccad4;--color-primary-highlight:#15282b;
  --color-on-primary:#06181a;
  --color-divider:oklch(1 0 0 / 0.06);--color-day:#f0b740;
  --color-night:#8f8fce;--color-scrub-active:#56b4c0;
  --color-glow:oklch(0.72 0.09 200 / 0.16);
  --shadow-sm:0 1px 2px oklch(0 0 0 / 0.3);
  --shadow-md:0 8px 28px -8px oklch(0 0 0 / 0.55);
  --shadow-lg:0 20px 48px -16px oklch(0 0 0 / 0.6);
  --radius-sm:0.5rem;--radius-md:0.75rem;--radius-lg:1.125rem;
  --radius-xl:1.5rem;--radius-full:9999px;--transition:180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="light"]{
  --color-bg:#f4f3ef;--color-surface:#ffffff;--color-surface-2:#f3f1ec;
  --color-surface-offset:#e9e6df;--color-border:oklch(0.2 0.01 80 / 0.09);
  --color-border-strong:oklch(0.2 0.01 80 / 0.16);
  --color-text:#191815;--color-text-muted:#6b6a64;--color-text-faint:#a8a6a0;
  --color-primary:#0a7a82;--color-primary-strong:#055c63;--color-primary-highlight:#d9eae8;
  --color-on-primary:#ffffff;
  --color-divider:oklch(0.2 0.01 80 / 0.07);
  --color-glow:oklch(0.55 0.08 200 / 0.10);
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80 / 0.05);
  --shadow-md:0 8px 28px -10px oklch(0.2 0.01 80 / 0.14);
  --shadow-lg:0 24px 48px -18px oklch(0.2 0.01 80 / 0.18);
}
html{font-size:16px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:clamp(0.875rem,1.2vw,1rem);line-height:1.6;
  color:var(--color-text);background:var(--color-bg);
  min-height:100vh;overflow-x:hidden;position:relative;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
body::before{
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(60rem 40rem at 15% -10%,var(--color-glow),transparent 60%),
    radial-gradient(50rem 36rem at 100% 0%,var(--color-glow),transparent 55%);
}
h1,h2,h3{font-weight:400;line-height:1.2}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font:inherit;color:inherit}
a{color:var(--color-primary);text-decoration:none}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px;border-radius:var(--radius-sm)}

/* Skip link */
.skip-link{
  position:absolute;top:-100%;left:50%;transform:translateX(-50%);
  padding:0.75rem 1.5rem;background:var(--color-primary);color:#fff;
  border-radius:var(--radius-sm);z-index:1000;font-weight:600;
  transition:top var(--transition);
}
.skip-link:focus{top:1rem}

/* Header */
.header{
  max-width:1320px;margin:0 auto;padding:2.25rem 1.75rem 1.25rem;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;
}
.header-left{display:flex;align-items:center;gap:1.125rem}
.logo{
  flex-shrink:0;color:var(--color-text);opacity:0.9;
  transition:opacity var(--transition);
}
.logo:hover{opacity:1}
.header-title{
  font-family:inherit;font-size:clamp(1.0625rem,2.1vw,1.375rem);
  font-weight:250;text-transform:uppercase;letter-spacing:0.38em;
  color:var(--color-text);line-height:1;padding-left:0.05em;
}
.header-tagline{
  font-size:0.625rem;text-transform:uppercase;letter-spacing:0.26em;
  font-weight:400;color:var(--color-text-muted);margin-top:0.5625rem;
}
.header-controls{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap}

/* Toggles */
.toggle-btn{
  display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.875rem;
  border-radius:var(--radius-full);background:var(--color-surface);
  border:1px solid var(--color-border);min-width:44px;min-height:44px;
  transition:background var(--transition),border-color var(--transition),color var(--transition),transform var(--transition);
  font-size:0.8125rem;font-weight:500;color:var(--color-text-muted);
  box-shadow:var(--shadow-sm);
}
.toggle-btn:hover{background:var(--color-surface-2);border-color:var(--color-border-strong);color:var(--color-text)}
.toggle-btn:active{transform:scale(0.96)}
.toggle-btn.active{
  background:color-mix(in srgb,var(--color-primary) 14%,transparent);
  border-color:color-mix(in srgb,var(--color-primary) 40%,transparent);
  color:var(--color-primary-strong);
}
.toggle-btn.active:hover{background:color-mix(in srgb,var(--color-primary) 20%,transparent);color:var(--color-primary-strong)}
.toggle-btn .icon{width:17px;height:17px;flex-shrink:0}
.toggle-btn .label{display:none}
@media(min-width:640px){.toggle-btn .label{display:inline}}

/* Time Travel Banner */
.banner{
  max-width:1320px;margin:0 auto;padding:0 1.75rem;
  opacity:0;transform:translateY(-8px);pointer-events:none;
  transition:opacity 200ms ease,transform 200ms ease;
}
.banner.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.banner-inner{
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  padding:0.75rem 0.75rem 0.75rem 1.125rem;border-radius:var(--radius-md);
  background:var(--color-primary-highlight);
  border:1px solid color-mix(in srgb,var(--color-primary) 35%,transparent);
}
.banner-text{font-size:0.875rem;color:var(--color-text);display:flex;align-items:center;gap:0.5rem}
.banner-text::before{
  content:"";width:7px;height:7px;border-radius:50%;background:var(--color-primary);
  box-shadow:0 0 0 4px color-mix(in srgb,var(--color-primary) 22%,transparent);
}
.banner-text strong{color:var(--color-primary-strong);font-variant-numeric:tabular-nums}
.banner-reset{
  padding:0.375rem 1rem;border-radius:var(--radius-sm);
  background:var(--color-primary);color:var(--color-on-primary);font-size:0.8125rem;font-weight:600;
  min-width:44px;min-height:36px;display:flex;align-items:center;justify-content:center;
  transition:background var(--transition),transform var(--transition);
}
.banner-reset:hover{background:var(--color-primary-strong)}
.banner-reset:active{transform:scale(0.96)}

/* Grid */
.grid{
  max-width:1320px;margin:0 auto;padding:1.5rem 1.75rem;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));
  gap:1.125rem;
}

/* Card */
.card{
  background:var(--color-surface);border:1px solid var(--color-border);
  border-radius:var(--radius-lg);padding:1.375rem 1.375rem 1.5rem;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
  transition:box-shadow var(--transition),border-color var(--transition);
}
/* Entrance/exit animation is opt-in. Cards are visible by default so that users
   with "reduce motion" always see them; only when motion is allowed do we start
   hidden and slide/fade in (and animate out on removal). */
@media(prefers-reduced-motion:no-preference){
  .card{
    opacity:0;transform:translateY(12px);
    transition:opacity 200ms ease,transform 200ms ease,box-shadow var(--transition),border-color var(--transition);
  }
  .card.enter{opacity:1;transform:translateY(0)}
  .card.remove{opacity:0;transform:scale(0.95);pointer-events:none}
}
.card:hover{box-shadow:var(--shadow-md);border-color:var(--color-border-strong);transform:translateY(-3px)}
.card.enter:hover{transform:translateY(-3px)}
/* Local card: subtle accent treatment */
.card-local{border-color:color-mix(in srgb,var(--color-primary) 30%,transparent)}
.card-local::before{
  content:"";position:absolute;inset:0 0 auto 0;height:3px;
  background:linear-gradient(90deg,var(--color-primary),transparent 85%);
}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem;margin-bottom:1rem}
.card-city{font-size:clamp(1.0625rem,1.5vw,1.1875rem);font-weight:600;color:var(--color-text);letter-spacing:-0.01em}
.card-local-tag{
  font-size:0.5625rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;
  padding:0.125rem 0.5rem;border-radius:var(--radius-full);margin-left:0.5rem;vertical-align:middle;
  background:color-mix(in srgb,var(--color-primary) 16%,transparent);color:var(--color-primary-strong);
}
.card-country{font-size:0.75rem;color:var(--color-text-muted);margin-top:0.1875rem;letter-spacing:0.01em}
.card-remove{
  width:32px;height:32px;margin:-0.25rem -0.25rem 0 0;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-full);flex-shrink:0;color:var(--color-text-faint);
  opacity:0;transition:background var(--transition),color var(--transition),opacity var(--transition);
}
.card:hover .card-remove,.card-remove:focus-visible{opacity:1}
.card-remove:hover{background:color-mix(in srgb,var(--color-night) 18%,transparent);color:var(--color-text)}
.card-remove .icon{width:16px;height:16px}
@media(hover:none){.card-remove{opacity:1}}
.card-time{
  font-size:clamp(2.25rem,4.5vw,3rem);font-weight:300;
  font-variant-numeric:tabular-nums lining-nums;
  letter-spacing:-0.03em;
  color:var(--color-text);margin-bottom:0.375rem;line-height:1;
  display:flex;align-items:center;flex-wrap:wrap;gap:0.625rem;
}
.card-date{font-size:0.8125rem;color:var(--color-text-muted);margin-bottom:0.875rem;letter-spacing:0.01em}
.card-period{
  font-size:0.625rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;
  padding:0.1875rem 0.5rem;border-radius:var(--radius-full);
  display:inline-flex;align-items:center;gap:0.3125rem;vertical-align:middle;
}
.card-period::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor}
.card-period.day{background:color-mix(in srgb,var(--color-day) 14%,transparent);color:var(--color-day)}
.card-period.night{background:color-mix(in srgb,var(--color-night) 16%,transparent);color:var(--color-night)}
.card-date-offset{font-size:0.6875rem;font-weight:600;padding:0.0625rem 0.4375rem;border-radius:var(--radius-full);display:inline-block;margin-left:0.375rem;vertical-align:middle}
.card-date-offset.forward{background:color-mix(in srgb,var(--color-primary) 15%,transparent);color:var(--color-primary-strong)}
.card-date-offset.backward{background:color-mix(in srgb,var(--color-night) 16%,transparent);color:var(--color-night)}
.card-utc{
  font-size:0.6875rem;font-weight:500;color:var(--color-text-muted);
  font-variant-numeric:tabular-nums;letter-spacing:0.03em;
  margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--color-divider);
}

/* Slider */
.slider-container{position:relative}
.slider-labels{display:flex;justify-content:space-between;margin-bottom:0.5rem}
.slider-label{font-size:0.625rem;color:var(--color-text-faint);letter-spacing:0.02em}
.slider{
  -webkit-appearance:none;appearance:none;width:100%;height:5px;
  border-radius:var(--radius-full);background:var(--color-surface-offset);
  outline:none;cursor:pointer;transition:background var(--transition);
}
.slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:var(--color-primary);cursor:grab;
  border:3px solid var(--color-surface);
  box-shadow:0 0 0 1px var(--color-primary),0 2px 6px oklch(0 0 0 / 0.3);
  transition:box-shadow var(--transition),transform var(--transition);
}
.slider:hover::-webkit-slider-thumb{box-shadow:0 0 0 1px var(--color-primary),0 0 0 6px color-mix(in srgb,var(--color-primary) 18%,transparent)}
.slider::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.12)}
.slider::-moz-range-thumb{
  width:16px;height:16px;border-radius:50%;
  background:var(--color-primary);cursor:grab;
  border:3px solid var(--color-surface);
  box-shadow:0 0 0 1px var(--color-primary),0 2px 6px oklch(0 0 0 / 0.3);
  transition:box-shadow var(--transition),transform var(--transition);
}
.slider::-moz-range-thumb:active{cursor:grabbing;transform:scale(1.12)}
.slider-value{
  text-align:center;font-size:0.75rem;font-weight:500;color:var(--color-primary-strong);
  margin-top:0.625rem;font-variant-numeric:tabular-nums;letter-spacing:0.02em;
}

/* Add timezone panel */
.add-panel{
  max-width:1320px;margin:0 auto;padding:0 1.75rem 2.5rem;
  opacity:0;transform:translateY(12px) scale(0.98);pointer-events:none;
  transition:opacity 180ms ease,transform 180ms ease;
}
.add-panel.visible{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.add-panel-inner{
  background:var(--color-surface);border:1px solid var(--color-border);
  border-radius:var(--radius-lg);padding:1.5rem;box-shadow:var(--shadow-sm);
}
.add-panel-title{
  font-size:0.6875rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  margin-bottom:0.875rem;color:var(--color-text-muted);
}
.add-search{
  width:100%;padding:0.75rem 1rem;border-radius:var(--radius-md);
  background:var(--color-surface-2);border:1px solid var(--color-border);
  color:var(--color-text);font-size:0.875rem;
  transition:border-color var(--transition),background var(--transition),box-shadow var(--transition);
  min-height:46px;
}
.add-search::placeholder{color:var(--color-text-faint)}
.add-search:focus{
  border-color:var(--color-primary);background:var(--color-surface);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--color-primary) 16%,transparent);
}
.add-list{
  margin-top:0.875rem;display:flex;flex-direction:column;gap:0.125rem;
  max-height:280px;overflow-y:auto;margin-right:-0.5rem;padding-right:0.5rem;
}
.add-item{
  display:flex;align-items:center;justify-content:space-between;gap:0.75rem;
  padding:0.5rem 0.625rem;border-radius:var(--radius-sm);
  transition:background var(--transition);min-height:44px;
}
.add-item:hover{background:var(--color-surface-2)}
.add-item-info{display:flex;flex-direction:column;min-width:0}
.add-item-city{font-size:0.875rem;color:var(--color-text);font-weight:500}
.add-item-meta{font-size:0.6875rem;color:var(--color-text-muted);letter-spacing:0.01em;margin-top:0.0625rem}
.add-item-add{
  padding:0.375rem 0.875rem;border-radius:var(--radius-full);
  background:transparent;color:var(--color-text-muted);font-size:0.75rem;font-weight:600;
  border:1px solid var(--color-border-strong);flex-shrink:0;
  min-width:44px;min-height:36px;display:flex;align-items:center;justify-content:center;
  transition:background var(--transition),color var(--transition),border-color var(--transition),transform var(--transition);
}
.add-item:hover .add-item-add{border-color:var(--color-primary);color:var(--color-primary-strong)}
.add-item-add:hover{background:var(--color-primary);border-color:var(--color-primary);color:var(--color-on-primary)}
.add-item-add:active{transform:scale(0.95)}
.add-item-add:disabled{opacity:0.3;cursor:not-allowed}
.add-empty{font-size:0.8125rem;color:var(--color-text-muted);padding:1.5rem 0;text-align:center}

/* View switch tabs */
.view-switch-bar{
  max-width:1320px;margin:0 auto;padding:0.25rem 1.75rem 0.5rem;
  display:flex;justify-content:center;
}
.view-switch{
  display:inline-flex;padding:0.25rem;gap:0.25rem;
  background:var(--color-surface);border:1px solid var(--color-border);
  border-radius:var(--radius-full);box-shadow:var(--shadow-sm);
}
.view-tab{
  display:flex;align-items:center;gap:0.4375rem;
  padding:0.5rem 1.125rem;border-radius:var(--radius-full);
  font-size:0.8125rem;font-weight:600;letter-spacing:0.01em;
  color:var(--color-text-muted);min-height:40px;
  transition:background var(--transition),color var(--transition);
}
.view-tab .icon{width:16px;height:16px;flex-shrink:0}
.view-tab:hover{color:var(--color-text)}
.view-tab.active{
  background:color-mix(in srgb,var(--color-primary) 16%,transparent);
  color:var(--color-primary-strong);
}

/* View visibility */
[data-view="map"] #main,[data-view="map"] #addPanel,[data-view="map"] #banner{display:none!important}
[data-view="clocks"] #mapView{display:none}

/* Map view */
.map-view{max-width:1320px;margin:0 auto;padding:1rem 1.75rem 2rem}
.map-intro{
  display:flex;align-items:baseline;justify-content:space-between;
  flex-wrap:wrap;gap:0.5rem 1rem;margin-bottom:1rem;
}
.map-intro h2{font-size:1rem;font-weight:600;color:var(--color-text);letter-spacing:-0.01em}
.map-intro p{font-size:0.75rem;color:var(--color-text-muted);max-width:46ch}
.map-scroll{
  overflow-x:auto;overflow-y:hidden;
  border:1px solid var(--color-border);border-radius:var(--radius-lg);
  background:var(--color-surface);box-shadow:var(--shadow-sm);
  /* Flip vertically so the horizontal scrollbar sits on top; content is
     flipped back below so it still reads right-side up. */
  transform:rotateX(180deg);
}
.map-strip{display:flex;align-items:stretch;min-width:min-content;transform:rotateX(180deg)}
.map-col{
  flex:1 0 158px;min-width:158px;
  border-right:1px solid var(--color-divider);
  display:flex;flex-direction:column;
}
.map-col:last-child{border-right:none}
.map-col.day{background:color-mix(in srgb,var(--color-day) 7%,transparent)}
.map-col.night{background:color-mix(in srgb,var(--color-night) 9%,transparent)}
.map-col-head{padding:0.875rem 0.875rem 0.75rem;border-bottom:1px solid var(--color-divider)}
.map-col-offset{
  font-size:0.6875rem;font-weight:700;letter-spacing:0.04em;
  color:var(--color-text-muted);text-transform:uppercase;
}
.map-col-time{
  font-size:1.25rem;font-weight:300;font-variant-numeric:tabular-nums;
  letter-spacing:-0.02em;color:var(--color-text);margin-top:0.125rem;line-height:1.1;
}
.map-col-period{
  display:inline-flex;align-items:center;gap:0.3125rem;margin-top:0.4375rem;
  font-size:0.625rem;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;
}
.map-col.day .map-col-period{color:var(--color-day)}
.map-col.night .map-col-period{color:var(--color-night)}
.map-col-period .mc-icon{display:inline-flex;align-items:center}
.map-col-period .icon{width:13px;height:13px}
.map-col-count{margin-left:auto;color:var(--color-text-faint);font-weight:500;letter-spacing:0}
.map-col-cities{display:flex;flex-direction:column;padding:0.5rem;gap:0.125rem}
.map-city{
  padding:0.4375rem 0.5rem;border-radius:var(--radius-sm);
  display:flex;flex-direction:column;gap:0.0625rem;border:1px solid transparent;
}

</style>

<script src="worldtime-data.js"></script>
<script>
// The shared dataset and helpers (TIMEZONE_DATA, DEFAULT_TIMEZONES, STORAGE_KEY,
// canonicalTz, LOCAL_TZ, dataByKey, keySlug, formatTime) are defined in
// worldtime-data.js, loaded just above. Alias keySlug -> domId so the existing
// call sites in this file keep working unchanged.
const domId = keySlug;

// First-visit theme default: honor the OS colour scheme, falling back to dark
// (the house style) when the OS states no preference. This mirrors the pre-paint
// bootstrap in <head>; loadState() overrides it once a saved choice exists.
function osPrefersLight() {
  return !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches);
}

const state = {
  timezones: [LOCAL_TZ, ...DEFAULT_TIMEZONES.filter(tz => tz !== LOCAL_TZ)],
  is24h: true,
  isDark: !osPrefersLight(),
  showSeconds: true,
  view: 'clocks',
  mapCentered: false,
  offsetMinutes: 0,
  intervalId: null,
  isDragging: false,
  sliderValues: {},
  // Zone-map render cache. `mapSig` is a fingerprint of the current band layout;
  // when it's null the map is rebuilt on the next render. `mapBands` holds the
  // per-column element refs so ticks can refresh times without touching the DOM
  // tree. `mapGroupMinute` throttles the (Intl-heavy) re-grouping to once a minute.
  mapSig: null,
  mapGroupMinute: null,
  mapBands: [],
};

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      timezones: state.timezones,
      is24h: state.is24h,
      isDark: state.isDark,
      showSeconds: state.showSeconds,
    }));
  } catch (e) { /* storage unavailable (private mode, etc.) — non-fatal */ }
}

function loadState() {
  let saved;
  try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); }
  catch (e) { saved = null; }
  if (!saved || typeof saved !== 'object') return;
  if (Array.isArray(saved.timezones) && saved.timezones.length) {
    // Drop any keys no longer in the catalog, then guarantee the local zone is
    // present and pinned first (matching the default-state convention).
    const known = saved.timezones.filter(k => dataByKey(k));
    state.timezones = [LOCAL_TZ, ...known.filter(k => k !== LOCAL_TZ)];
  }
  if (typeof saved.is24h === 'boolean') state.is24h = saved.is24h;
  if (typeof saved.isDark === 'boolean') state.isDark = saved.isDark;
  if (typeof saved.showSeconds === 'boolean') state.showSeconds = saved.showSeconds;
}

// Consume a shared `?cities=` deep link, if one is present and resolves to at
// least one known city. Runs right after loadState() so a shared link takes
// precedence over the saved selection. The chosen cities go through the same
// normalization as loadState (local zone pinned first, deduped), are persisted so
// a reload or other tab keeps them, and the param is then stripped from the
// address bar via replaceState — leaving a clean URL and no stale link once the
// user edits their own selection. citiesFromParam lives in worldtime-data.js.
function applyUrlCities() {
  let keys;
  try {
    keys = citiesFromParam(new URLSearchParams(window.location.search).get(CITIES_PARAM));
  } catch (e) { return; }
  if (!keys.length) return;
  const rest = [...new Set(keys.filter(k => k !== LOCAL_TZ))];
  state.timezones = [LOCAL_TZ, ...rest];
  saveState();
  try {
    const url = new URL(window.location.href);
    url.searchParams.delete(CITIES_PARAM);
    window.history.replaceState(null, '', url.pathname + url.search + url.hash);
  } catch (e) { /* replaceState can throw on file:// — harmless, leave the URL */ }
}

// Reflect the current preference state onto the header controls and theme. Used
// once on init after loading saved preferences so the UI matches restored state.
function syncControls() {
  document.getElementById('label24h').textContent = state.is24h ? '24H' : '12H';
  const btnSeconds = document.getElementById('btnSeconds');
  btnSeconds.classList.toggle('active', state.showSeconds);
  btnSeconds.setAttribute('aria-pressed', String(state.showSeconds));
  applyThemeToDom(state.isDark); // shared header theme logic — see worldtime-data.js
}

// Live cross-tab sync. When another tab (this page or explore.html) changes the
// shared preferences/selection in localStorage, re-apply them here without a
// reload. The `storage` event fires only in *other* documents, so this never
// echoes our own writes and can't loop. The transient time-travel offset is
// per-tab and intentionally left untouched.
function syncFromStorage() {
  loadState();
  syncControls();
  const addSearch = document.getElementById('addSearch');
  renderAddList(addSearch ? addSearch.value : '');
  state.mapSig = null; // selection may have changed — force a map rebuild
  render();
}

function getCurrentTime(tzId, when) {
  const instant = when || new Date();
  // Reuse cached Intl formatters (see getDateTimeFormat in worldtime-data.js) —
  // this runs once per card on every tick, so re-constructing them would be waste.
  const parts = getDateTimeFormat(tzId, {
    hour: 'numeric', minute: '2-digit', second: '2-digit',
    hour12: false, weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
  }).formatToParts(instant);
  const get = (type) => parts.find(p => p.type === type)?.value || '';
  const hour = parseInt(get('hour'), 10) % 24;
  const minute = parseInt(get('minute'), 10);
  const second = parseInt(get('second'), 10);
  const weekday = get('weekday');
  const month = get('month');
  const day = get('day');
  const year = get('year');
  const dateStr = month + ' ' + day + ', ' + year;

  const offsetParts = getDateTimeFormat(tzId, {
    timeZoneName: 'shortOffset',
  }).formatToParts(instant);
  const tzName = offsetParts.find(p => p.type === 'timeZoneName')?.value || '';
  const utcOffset = tzName.replace(/^(GMT|UTC)/, '');

  return { hour, minute, second, weekday, month, day, year, date: dateStr, utcOffset };
}

// dayNumberInZone, zoneOffsetMinutes, zoneAbbr and isDaytime now live in the
// shared worldtime-data.js (loaded before this script) so they can be reused by
// explore.html and covered by unit tests.

function getSliderValue(key) {
  if (state.sliderValues[key] !== undefined) return state.sliderValues[key];
  const data = dataByKey(key);
  const t = getCurrentTime(data ? data.id : key);
  return t.hour * 60 + t.minute;
}

function createCard(key) {
  const data = dataByKey(key);
  if (!data) return null;
  const isLocal = key === LOCAL_TZ;
  const dk = domId(key);
  const card = document.createElement('div');
  card.className = isLocal ? 'card card-local' : 'card';
  card.dataset.tz = key;
  card.setAttribute('role', 'region');
  card.setAttribute('aria-label', data.city + (isLocal ? ' local time' : ' time'));

  const sliderVal = getSliderValue(key);
  state.sliderValues[key] = sliderVal;

  card.innerHTML = `
    <div class="card-header">
      <div>
        <div class="card-city">${escHtml(data.city)}${isLocal ? '<span class="card-local-tag">Local</span>' : ''}</div>
        <div class="card-country">${escHtml(data.country)}</div>
      </div>
      ${isLocal ? '' : `<button class="card-remove" data-remove="${escAttr(key)}" aria-label="Remove ${escAttr(data.city)}" title="Remove">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>`}
    </div>
    <div class="card-time" id="time-${dk}"></div>
    <div class="card-date" id="date-${dk}"></div>
    <div class="card-utc" id="utc-${dk}"></div>
    <div class="slider-container">
      <div class="slider-labels">
        <span class="slider-label">12AM</span>
        <span class="slider-label">6AM</span>
        <span class="slider-label">12PM</span>
        <span class="slider-label">6PM</span>
        <span class="slider-label">11PM</span>
      </div>
      <input type="range" class="slider" min="0" max="1439" value="${sliderVal}"
        data-tz="${escAttr(key)}" aria-label="Time slider for ${escAttr(data.city)}" tabindex="0">
      <div class="slider-value" id="slider-val-${dk}"></div>
    </div>
  `;

  const slider = card.querySelector('.slider');
  updateSliderTrack(slider, sliderVal);
  updateSliderReadout(slider, card.querySelector('.slider-value'), sliderVal);

  slider.addEventListener('input', (e) => onSliderInput(e, key));
  const removeBtn = card.querySelector('[data-remove]');
  if (removeBtn) removeBtn.addEventListener('click', () => removeTimezone(key));

  return card;
}

function updateSliderTrack(slider, value) {
  const pct = (value / 1439) * 100;
  slider.style.background = `linear-gradient(to right, var(--color-scrub-active) 0%, var(--color-scrub-active) ${pct}%, var(--color-surface-offset) ${pct}%, var(--color-surface-offset) 100%)`;
}

// Refresh a card slider's readouts from a minute-of-day value: the visible label
// (which honors the seconds preference) and, for screen readers, aria-valuetext.
// Without the latter, assistive tech announces the raw slider number ("660")
// instead of the wall-clock time ("11:00 AM"); seconds are dropped there because
// the slider is minute-resolution, so they'd always be ":00".
function updateSliderReadout(slider, valEl, minuteOfDay) {
  const h = Math.floor(minuteOfDay / 60);
  const m = minuteOfDay % 60;
  if (valEl) valEl.textContent = formatTime(h, m, 0, state.is24h, state.showSeconds);
  if (slider) slider.setAttribute('aria-valuetext', formatTime(h, m, 0, state.is24h, false));
}

function renderAllCards() {
  const grid = document.getElementById('main');
  const existingCards = new Set();
  grid.querySelectorAll('.card').forEach(c => existingCards.add(c.dataset.tz));

  const desiredCards = new Set(state.timezones);

  desiredCards.forEach(tzKey => {
    let card = grid.querySelector(`.card[data-tz="${tzKey}"]`);
    if (!card) {
      card = createCard(tzKey);
      if (card) {
        grid.appendChild(card);
        requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('enter')));
      }
    }
  });

  existingCards.forEach(tzKey => {
    if (!desiredCards.has(tzKey)) {
      const card = grid.querySelector(`.card[data-tz="${tzKey}"]`);
      if (card) {
        card.classList.remove('enter');
        card.classList.add('remove');
        setTimeout(() => card.remove(), 180);
      }
    }
  });

  const now = new Date();
  const adjNow = new Date(now.getTime() + state.offsetMinutes * 60000);
  const localDayNum = dayNumberInZone(LOCAL_TZ, adjNow);

  state.timezones.forEach(tzKey => {
    const card = grid.querySelector(`.card[data-tz="${tzKey}"]`);
    const data = dataByKey(tzKey);
    if (card && data) {
      // Both the time and the date are derived from the same adjusted instant,
      // so they always stay in sync when time-travelling across midnight.
      const t = getCurrentTime(data.id, adjNow);
      const adjustedHour = t.hour;
      const adjustedMinute = t.minute;
      const adjustedSecond = t.second;

      const key = domId(tzKey);
      const timeEl = document.getElementById('time-' + key);
      const dateEl = document.getElementById('date-' + key);
      const utcEl = document.getElementById('utc-' + key);
      const valEl = document.getElementById('slider-val-' + key);

      if (timeEl) {
        const period = isDaytime(adjustedHour) ? 'day' : 'night';
        const periodLabel = isDaytime(adjustedHour) ? 'Day' : 'Night';
        timeEl.innerHTML = formatTime(adjustedHour, adjustedMinute, adjustedSecond, state.is24h, state.showSeconds) +
          `<span class="card-period ${period}">${periodLabel}</span>`;
      }
      if (dateEl) {
        const dayDiff = dayNumberInZone(data.id, adjNow) - localDayNum;
        let dayFlag = '';
        if (dayDiff === 1) dayFlag = '<span class="card-date-offset forward">+1 day</span>';
        else if (dayDiff === -1) dayFlag = '<span class="card-date-offset backward">-1 day</span>';
        else if (dayDiff > 1) dayFlag = '<span class="card-date-offset forward">+' + dayDiff + ' days</span>';
        else if (dayDiff < -1) dayFlag = '<span class="card-date-offset backward">' + dayDiff + ' days</span>';
        dateEl.innerHTML = t.weekday + ', ' + t.month + ' ' + t.day + ', ' + t.year + dayFlag;
      }
      if (utcEl) utcEl.textContent = 'UTC' + t.utcOffset;

      const currentSliderVal = adjustedHour * 60 + adjustedMinute;
      state.sliderValues[tzKey] = currentSliderVal;
      const slider = card.querySelector('.slider');
      if (slider) {
        if (parseInt(slider.value, 10) !== currentSliderVal) {
          slider.value = currentSliderVal;
          updateSliderTrack(slider, currentSliderVal);
        }
      }
      updateSliderReadout(slider, valEl, currentSliderVal);
    }
  });

  updateBanner();
}

function updateBanner() {
  const banner = document.getElementById('banner');
  const bannerText = document.getElementById('bannerText');
  if (state.offsetMinutes !== 0) {
    bannerText.innerHTML = 'Time Travel Active <strong>' + formatTravelOffset(state.offsetMinutes) + '</strong>';
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
}

const MAP_ICON_DAY = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 3v2m0 14v2M3 12h2m14 0h2M5.6 5.6l1.4 1.4m10 10l1.4 1.4M18.4 5.6 17 7M7 17l-1.4 1.4"/></svg>';
const MAP_ICON_NIGHT = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>';

// Human-readable UTC offset label from minutes east of UTC, e.g. 330 -> "UTC+5:30".
function formatOffset(min) {
  if (min === 0) return 'UTC';
  const sign = min > 0 ? '+' : '-';
  const abs = Math.abs(min);
  const h = Math.floor(abs / 60);
  const m = abs % 60;
  return 'UTC' + sign + h + (m ? ':' + String(m).padStart(2, '0') : '');
}

// Map view: lay every catalog city into a vertical band keyed by its current
// UTC offset, ordered west (negative) to east (positive). All cities in a band
// share the same wall-clock time, so the time/day-night is shown once per band.
// The Zone map is split into two phases so it doesn't thrash the DOM every
// second. buildMapStructure() writes the column/city markup — the expensive part,
// since it groups every zone by offset and resolves each abbreviation via Intl.
// updateMapTimes() then refreshes only the per-band clock and day/night state on
// each tick using plain arithmetic (no Intl, no innerHTML). The structure is
// rebuilt only when the layout actually changes: the selection changed (mapSig is
// forced to null), or a DST transition shifted a zone between bands — re-checked
// at most once per minute rather than every second.
function renderMap() {
  const strip = document.getElementById('mapStrip');
  if (!strip) return;
  const adjNow = new Date(Date.now() + state.offsetMinutes * 60000);
  const minuteStamp = Math.floor(adjNow.getTime() / 60000);

  if (state.mapSig === null || minuteStamp !== state.mapGroupMinute) {
    state.mapGroupMinute = minuteStamp;

    const groups = new Map();
    TIMEZONE_DATA.forEach(d => {
      const off = zoneOffsetMinutes(d.id, adjNow);
      if (!groups.has(off)) groups.set(off, []);
      groups.get(off).push(d);
    });
    const offsets = [...groups.keys()].sort((a, b) => a - b);

    const sig = offsets.map(o => o + ':' + groups.get(o).map(d => d.key).join(',')).join('|')
      + '||' + state.timezones.join(',');
    if (sig !== state.mapSig) {
      state.mapSig = sig;
      buildMapStructure(strip, offsets, groups, adjNow);
    }
  }

  updateMapTimes(adjNow);
}

// Write the band columns once. Times are left blank here and filled by
// updateMapTimes, so build and refresh can never disagree.
function buildMapStructure(strip, offsets, groups, adjNow) {
  strip.innerHTML = offsets.map(off => {
    const cities = groups.get(off);
    cities.sort((a, b) => {
      const la = a.key === LOCAL_TZ, lb = b.key === LOCAL_TZ;
      if (la !== lb) return la ? -1 : 1;
      const sa = state.timezones.includes(a.key), sb = state.timezones.includes(b.key);
      if (sa !== sb) return sa ? -1 : 1;
      return a.city.localeCompare(b.city);
    });

    const citiesHtml = cities.map(d => {
      const sel = state.timezones.includes(d.key);
      const loc = d.key === LOCAL_TZ;
      const cls = 'map-city' + (loc ? ' local' : (sel ? ' selected' : ''));
      const abbr = zoneAbbr(d.id, d, adjNow);
      return '<div class="' + cls + '">' +
        '<span class="map-city-main"><span class="map-city-name">' + escHtml(d.city) + '</span>' +
        (loc ? '<span class="map-city-tag">Local</span>' : '') + '</span>' +
        '<span class="map-city-sub">' + escHtml(d.country) + ' &middot; ' + escHtml(abbr) + '</span>' +
        '</div>';
    }).join('');

    return '<div class="map-col" data-off="' + off + '">' +
      '<div class="map-col-head">' +
        '<div class="map-col-offset">' + formatOffset(off) + '</div>' +
        '<div class="map-col-time"></div>' +
        '<div class="map-col-period">' +
          '<span class="mc-icon"></span>' +
          '<span class="mc-word"></span>' +
          '<span class="map-col-count">' + cities.length + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="map-col-cities">' + citiesHtml + '</div>' +
    '</div>';
  }).join('');

  // Cache per-band element refs. Columns are appended in ascending-offset order,
  // so strip.children lines up with `offsets`. `day` starts null so the first
  // updateMapTimes always paints the day/night styling.
  state.mapBands = offsets.map((off, i) => {
    const col = strip.children[i];
    return {
      off,
      col,
      timeEl: col.querySelector('.map-col-time'),
      iconEl: col.querySelector('.mc-icon'),
      wordEl: col.querySelector('.mc-word'),
      day: null,
    };
  });
}

// Per-tick refresh: derive each band's wall clock from the shared instant by
// simple offset arithmetic (every zone shares the same seconds), and flip the
// day/night styling only when it actually changes.
function updateMapTimes(adjNow) {
  const baseMs = adjNow.getTime();
  state.mapBands.forEach(b => {
    const d = new Date(baseMs + b.off * 60000);
    const hour = d.getUTCHours();
    b.timeEl.textContent = formatTime(hour, d.getUTCMinutes(), d.getUTCSeconds(), state.is24h, state.showSeconds);
    const day = isDaytime(hour);
    if (day !== b.day) {
      b.day = day;
      b.col.classList.toggle('day', day);
      b.col.classList.toggle('night', !day);
      b.iconEl.innerHTML = day ? MAP_ICON_DAY : MAP_ICON_NIGHT;
      b.wordEl.textContent = day ? 'Day' : 'Night';
    }
  });
}

// Render whichever view is currently active.
function render() {
  if (state.view === 'map') renderMap();
  else renderAllCards();
}

function switchView(view) {
  if (view === state.view) return;
  state.view = view;
  document.body.dataset.view = view;
  const isMap = view === 'map';
  const tabClocks = document.getElementById('tabClocks');
  const tabMap = document.getElementById('tabMap');
  tabMap.classList.toggle('active', isMap);
  tabClocks.classList.toggle('active', !isMap);
  tabMap.setAttribute('aria-selected', String(isMap));
  tabClocks.setAttribute('aria-selected', String(!isMap));
  // Roving tabindex: only the selected tab is in the page tab order; arrow keys
  // move between tabs (see the tablist keydown handler in init).
  tabMap.tabIndex = isMap ? 0 : -1;
  tabClocks.tabIndex = isMap ? -1 : 0;
  const note = document.getElementById('footerNote');
  if (note) note.textContent = isMap
    ? 'Worldtime — Cities grouped by current UTC offset, west to east.'
    : 'Worldtime — Drag sliders to travel through time.';
  render();
  // On first open, start the band strip scrolled to the middle rather than the
  // far-western edge. Done once so a user's own scroll position is preserved.
  if (isMap && !state.mapCentered) {
    const scroll = document.querySelector('.map-scroll');
    if (scroll) {
      scroll.scrollLeft = Math.max(0, (scroll.scrollWidth - scroll.clientWidth) / 2);
      state.mapCentered = true;
    }
  }
}

function tick() {
  if (state.isDragging) return;
  state.timezones.forEach(tzKey => {
    const data = dataByKey(tzKey);
    if (!data) return;
    const t = getCurrentTime(data.id);
    if (state.sliderValues[tzKey] === undefined) {
      state.sliderValues[tzKey] = t.hour * 60 + t.minute;
    }
  });
  render();
}

function startClock() {
  stopClock();
  state.intervalId = setInterval(tick, 1000);
  tick();
}

function stopClock() {
  if (state.intervalId) {
    clearInterval(state.intervalId);
    state.intervalId = null;
  }
}

function setOffset(deltaMinutes) {
  state.offsetMinutes += deltaMinutes;
  state.mapSig = null; // offset change can re-band zones — force a map rebuild
  render();
}

function onSliderInput(event, key) {
  const slider = event.target;
  const newMinuteOfDay = parseInt(slider.value, 10);

  if (state.sliderValues[key] === undefined) {
    state.sliderValues[key] = getSliderValue(key);
  }

  const oldMinuteOfDay = state.sliderValues[key];
  let delta = newMinuteOfDay - oldMinuteOfDay;

  if (delta > 720) delta -= 1440;
  if (delta < -720) delta += 1440;

  state.sliderValues[key] = newMinuteOfDay;

  if (delta !== 0) {
    setOffset(delta);
  }

  updateSliderTrack(slider, newMinuteOfDay);

  const card = slider.closest('.card');
  const valEl = card.querySelector('.slider-value');
  updateSliderReadout(slider, valEl, newMinuteOfDay);

  if (!state.isDragging) {
    state.isDragging = true;
    stopClock();
  }
}

document.addEventListener('mouseup', () => {
  if (state.isDragging) {
    state.isDragging = false;
    startClock();
  }
});
document.addEventListener('touchend', () => {
  if (state.isDragging) {
    state.isDragging = false;
    startClock();
  }
});

function resetToNow() {
  state.offsetMinutes = 0;
  state.mapSig = null; // back to real time — force a map rebuild
  state.timezones.forEach(tzKey => {
    const data = dataByKey(tzKey);
    if (!data) return;
    const t = getCurrentTime(data.id);
    state.sliderValues[tzKey] = t.hour * 60 + t.minute;
  });
  render();
}

function addTimezone(key) {
  const data = dataByKey(key);
  if (data && !state.timezones.includes(key)) {
    state.timezones.push(key);
    const t = getCurrentTime(data.id);
    state.sliderValues[key] = t.hour * 60 + t.minute;
    state.mapSig = null; // selection changed — force a map rebuild
    render();
    saveState();
  }
  document.getElementById('addSearch').value = '';
  renderAddList('');
}

function removeTimezone(key) {
  state.timezones = state.timezones.filter(k => k !== key);
  delete state.sliderValues[key];
  state.mapSig = null; // selection changed — force a map rebuild
  render();
  saveState();
}

function toggleTheme() {
  state.isDark = !state.isDark;
  applyThemeToDom(state.isDark); // shared header theme logic — see worldtime-data.js
  saveState();
}

function toggle24h() {
  state.is24h = !state.is24h;
  document.getElementById('label24h').textContent = state.is24h ? '24H' : '12H';
  render();
  saveState();
}

function toggleSeconds() {
  state.showSeconds = !state.showSeconds;
  const btn = document.getElementById('btnSeconds');
  btn.classList.toggle('active', state.showSeconds);
  btn.setAttribute('aria-pressed', String(state.showSeconds));
  render();
  saveState();
}

function renderAddList(query) {
  const list = document.getElementById('addList');
  const q = query.toLowerCase().trim();
  const filtered = TIMEZONE_DATA
    .filter(d => !state.timezones.includes(d.key))
    .map(d => ({ ...d, liveAbbr: zoneAbbr(d.id, d) }))
    .filter(d =>
      d.city.toLowerCase().includes(q) ||
      d.country.toLowerCase().includes(q) ||
      d.id.toLowerCase().includes(q) ||
      d.abbr.toLowerCase().includes(q) ||
      d.liveAbbr.toLowerCase().includes(q)
    );

  if (filtered.length === 0) {
    list.innerHTML = '<div class="add-empty">' + (q ? 'No matching timezones found' : 'All timezones added') + '</div>';
    return;
  }

  list.innerHTML = filtered.map(d => `
    <div class="add-item">
      <div class="add-item-info">
        <span class="add-item-city">${escHtml(d.city)}</span>
        <span class="add-item-meta">${escHtml(d.country)} &middot; ${escHtml(d.liveAbbr)}</span>
      </div>
      <button class="add-item-add" data-add="${escAttr(d.key)}" aria-label="Add ${escAttr(d.city)}">Add</button>
    </div>
  `).join('');

  list.querySelectorAll('[data-add]').forEach(btn => {
    btn.addEventListener('click', () => addTimezone(btn.dataset.add));
  });
}

function init() {
  loadState();
  applyUrlCities(); // a shared ?cities= link overrides the saved selection
  syncControls();

  const btn24h = document.getElementById('btn24h');
  const btnSeconds = document.getElementById('btnSeconds');
  const btnTheme = document.getElementById('btnTheme');
  const btnShare = document.getElementById('btnShare');
  const btnReset = document.getElementById('btnReset');
  const addSearch = document.getElementById('addSearch');

  btn24h.addEventListener('click', toggle24h);
  btnSeconds.addEventListener('click', toggleSeconds);
  btnTheme.addEventListener('click', toggleTheme);
  btnShare.addEventListener('click', () => copyShareLink(state.timezones));
  btnReset.addEventListener('click', resetToNow);

  // WAI-ARIA tabs: click to select, plus arrow/Home/End keyboard navigation with
  // automatic activation (moving focus to a tab also switches the view).
  const tabs = [
    { el: document.getElementById('tabClocks'), view: 'clocks' },
    { el: document.getElementById('tabMap'), view: 'map' },
  ];
  tabs.forEach(({ el, view }, i) => {
    el.addEventListener('click', () => switchView(view));
    el.addEventListener('keydown', (e) => {
      let next = -1;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next = (i + 1) % tabs.length;
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') next = (i - 1 + tabs.length) % tabs.length;
      else if (e.key === 'Home') next = 0;
      else if (e.key === 'End') next = tabs.length - 1;
      else return;
      e.preventDefault();
      switchView(tabs[next].view);
      tabs[next].el.focus();
    });
  });

  addSearch.addEventListener('input', (e) => renderAddList(e.target.value));

  // Keep this tab in step with changes made in any other Worldtime tab.
  window.addEventListener('storage', (e) => {
    if (e.key && e.key !== STORAGE_KEY) return;
    syncFromStorage();
  });

  document.getElementById('addPanel').classList.add('visible');
  renderAddList('');
  render();
  startClock();
  // Seed storage on first load so explore.html always has a selection to read.
  saveState();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
